    - provider_id: beersoccer/mem0ai/mem0ai
      provider_type: builtin
      provider_name: beersoccer/mem0ai/mem0ai
      tool_name: update_memory
      tool_label: Update Memory
      tool_parameters:
        memory_id: null
        text: null
        run_id: null
        timeout: null
      notAuthor: false
      enabled: true
      type: builtin
    - provider_id: beersoccer/mem0ai/mem0ai
      provider_type: builtin
      provider_name: beersoccer/mem0ai/mem0ai
      tool_name: delete_memory
      tool_label: Delete Memory
      tool_parameters:
        memory_id: null
        run_id: null
        timeout: null
      notAuthor: false
