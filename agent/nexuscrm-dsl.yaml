      type: builtin
    - provider_id: beersoccer/mem0ai/mem0ai
      provider_type: builtin
      provider_name: beersoccer/mem0ai/mem0ai
      tool_name: delete_all_memories
      tool_label: Delete All Memories
      tool_parameters:
        user_id: null
        agent_id: null
        run_id: null
        timeout: null
      notAuthor: false
      enabled: true
      type: builtin
    - provider_id: beersoccer/mem0ai/mem0ai
      provider_type: builtin
      provider_name: beersoccer/mem0ai/mem0ai
      tool_name: get_memory_history
      tool_label: Get Memory History
      tool_parameters:
        memory_id: null
        run_id: null
        timeout: null
      notAuthor: false
      enabled: true
      type: builtin
    - provider_id: beersoccer/mem0ai/mem0ai
      provider_type: builtin
      provider_name: beersoccer/mem0ai/mem0ai
      tool_name: extract_long_term_memory
      tool_label: Extract Long Term Memory
      tool_parameters:
        user_ids: null
        app_id: null
